<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>NOVA Store</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: #111;
      padding: 20px;
      border-radius: 10px;
    }
    button {
      margin-top: 10px;
      padding: 10px;
      background: purple;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>NOVA</h1>
<p>BE YOU. CREATE YOUR STYLE.</p>

<div class="grid">
  <div class="card">Glitch Tee<br>25€<br><button>Buy</button></div>
  <div class="card">Skull Tee<br>25€<br><button>Buy</button></div>
  <div class="card">Eye Tee<br>25€<br><button>Buy</button></div>
  <div class="card">Storm Tee<br>25€<br><button>Buy</button></div>
</div>

</body>
</html>
